<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard (Optimiert)</title>

    <style>
      :root {
        --bg-dark: #16213e;
        --bg-mid: #0f3460;
        --bg-light: #533483;
        --accent: #e94560;
        --radius: 10px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        color: white;
      }

      .container {
        display: flex;
        min-height: 100vh;
        gap: 1rem;
        padding: 1rem;
      }

      /* Sidebar */
      .sidebar {
        width: 250px;
        background: var(--bg-dark);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        background: var(--accent);
        padding: 1.2rem;
        font-weight: bold;
        text-align: center;
      }

      .sidebar-content {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex: 1;
        padding: 1rem;
      }

      .sidebar-items {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .sidebar-item {
        background: var(--bg-mid);
        padding: 0.8rem;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .sidebar-item:hover {
        background: var(--bg-light);
        transform: translateX(3px);
      }

      /* Main */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* Topbar */
      .topbar {
        display: flex;
        gap: 1rem;
      }

      .topbar-section {
        flex: 1;
        padding: 1rem;
        border-radius: var(--radius);
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-mid);
      }

      .topbar-section:nth-child(2) {
        background: var(--bg-light);
      }

      .topbar-section:nth-child(3) {
        background: var(--accent);
      }

      /* Content */
      .content {
        flex: 1;
        display: flex;
        gap: 1rem;
      }

      .left {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .content-top {
        flex: 2;
        background: var(--bg-dark);
        padding: 1rem;
        border-radius: var(--radius);
      }

      .content-bottom {
        flex: 1;
        display: flex;
        gap: 1rem;
      }

      .card {
        flex: 1;
        background: var(--bg-light);
        padding: 1rem;
        border-radius: var(--radius);
      }

      .card:nth-child(2) {
        background: var(--bg-mid);
      }

      .right {
        flex: 1;
        background: var(--accent);
        padding: 1rem;
        border-radius: var(--radius);
      }

      /* Responsive */
      @media (max-width: 900px) {
        .container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          flex-direction: row;
          overflow-x: auto;
        }

        .sidebar-content {
          flex-direction: row;
          gap: 1rem;
        }

        .content {
          flex-direction: column;
        }

        .content-bottom {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">Dashboard</div>

        <div class="sidebar-content">
          <div class="sidebar-items">
            <div class="sidebar-item">Übersicht</div>
            <div class="sidebar-item">Statistiken</div>
            <div class="sidebar-item">Berichte</div>
            <div class="sidebar-item">Einstellungen</div>
            <div class="sidebar-item">Benutzer</div>
            <div class="sidebar-item">Hilfe</div>
          </div>

          <div class="sidebar-item">Logout</div>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <div class="topbar">
          <div class="topbar-section">Suche</div>
          <div class="topbar-section">Benachrichtigungen</div>
          <div class="topbar-section">Profil</div>
        </div>

        <div class="content">
          <div class="left">
            <div class="content-top">Hauptinhalt</div>

            <div class="content-bottom">
              <div class="card">Widget 1</div>
              <div class="card">Widget 2</div>
            </div>
          </div>

          <div class="right">Zusatzinfos</div>
        </div>
      </main>
    </div>
  </body>
</html>
